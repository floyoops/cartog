name: Feature Request
description: Propose a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        For significant changes, please open an issue before writing code so we can align on the approach.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the current limitation?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to implement this
