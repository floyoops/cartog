name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Search [existing issues](https://github.com/jrollin/cartog/issues) before filing.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `cartog ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - cartog version: (run `cartog --version`)
        - OS: (e.g. macOS 14, Ubuntu 22.04)
        - Language being indexed: (e.g. Rust, Python)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      render: shell
