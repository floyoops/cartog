name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        env:
          CARTOG_RELEASE_BUILD: "1"
        run: cargo build --release --target ${{ matrix.target }}

      # Smoke-test the built binary (all runners are native — no cross-compilation)
      - name: Smoke test (unix)
        if: runner.os != 'Windows'
        run: |
          BIN=target/${{ matrix.target }}/release/cartog
          set -e

          # Binary executes and reports correct version
          VERSION=$($BIN --version)
          echo "$VERSION"
          echo "$VERSION" | grep -q "cartog"

          # All expected subcommands are present
          HELP=$($BIN --help)
          for cmd in index outline search refs callees impact hierarchy deps stats doctor config map changes watch serve rag; do
            echo "$HELP" | grep -q "$cmd" || { echo "FAIL: missing subcommand '$cmd'"; exit 1; }
          done

          # RAG subcommands exist (proves provider-local is compiled in)
          RAG_HELP=$($BIN rag --help)
          for cmd in setup index search; do
            echo "$RAG_HELP" | grep -q "$cmd" || { echo "FAIL: missing rag subcommand '$cmd'"; exit 1; }
          done

          echo "Smoke test passed"

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/cartog.exe
          set -e

          VERSION=$($BIN --version)
          echo "$VERSION"
          echo "$VERSION" | grep -q "cartog"

          HELP=$($BIN --help)
          for cmd in index outline search refs callees impact hierarchy deps stats doctor config map changes watch serve rag; do
            echo "$HELP" | grep -q "$cmd" || { echo "FAIL: missing subcommand '$cmd'"; exit 1; }
          done

          RAG_HELP=$($BIN rag --help)
          for cmd in setup index search; do
            echo "$RAG_HELP" | grep -q "$cmd" || { echo "FAIL: missing rag subcommand '$cmd'"; exit 1; }
          done

          echo "Smoke test passed"

      # Generate man page from the built binary so it always matches shipped
      # subcommands. All matrix entries run natively (see smoke-test comment
      # above), so this must succeed on every unix runner.
      - name: Generate manpage (unix)
        if: runner.os != 'Windows'
        run: |
          set -e
          BIN=target/${{ matrix.target }}/release/cartog
          $BIN manpage > target/${{ matrix.target }}/release/cartog.1
          test -s target/${{ matrix.target }}/release/cartog.1

      # Package unix — hard-require both the binary and the manpage.
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cartog-${{ matrix.target }}.tar.gz cartog cartog.1
          cd ../../..

      # Package windows
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../cartog-${{ matrix.target }}.zip cartog.exe
          cd ../../..

      - uses: actions/upload-artifact@v7
        with:
          name: cartog-${{ matrix.target }}
          path: cartog-${{ matrix.target }}.*

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog with git-cliff
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

  release:
    name: Create Release
    needs: [build, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      # Generate SHA256SUMS over every shipped archive. Format matches
      # `sha256sum -c` (one entry per line, "<hash>  <filename>") so users
      # and `cartog self update` can verify downloads in bulk.
      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd artifacts
          # nullglob: an absent matrix target (e.g. dropped Windows) expands
          # to nothing instead of a literal pattern that would fail sha256sum.
          shopt -s nullglob
          files=( cartog-*.tar.gz cartog-*.zip )
          shopt -u nullglob
          if [ ${#files[@]} -eq 0 ]; then
            echo "no release archives to hash" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          echo "::group::SHA256SUMS"
          cat SHA256SUMS
          echo "::endgroup::"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ needs.changelog.outputs.release_body }}
          files: artifacts/*

  # NOTE: CARTOG_RELEASE_BUILD is intentionally NOT set in this job. Binaries
  # produced by `cargo install cartog` from crates.io must be detected as
  # `cargo` at runtime (via the path heuristic in commands/self_cmd.rs).
  # Setting it here would brand them as `release-tarball` and let
  # `cartog self update` overwrite cargo-managed binaries.
  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish all crates in dependency order
        env:
          # Do not add CARTOG_RELEASE_BUILD here — see job-level NOTE above.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          crates=(
            cartog-core
            cartog-languages
            cartog-db
            cartog-lsp
            cartog-rag
            cartog-indexer
            cartog-process-lock
            cartog-watch
            cartog-mcp
            cartog
          )
          for crate in "${crates[@]}"; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --no-verify
            if [ "$crate" != "cartog" ]; then
              echo "Waiting for crates.io index to update..."
              sleep 60
            fi
          done
