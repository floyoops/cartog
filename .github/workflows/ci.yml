name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "site/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "site/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check
      - run: cargo check --features lsp

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --features lsp -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
      - run: cargo test --features lsp

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  # --- Security (blocking) ---

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: Dependency Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  # --- Performance (informational) ---

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    # Benchmarks on shared GitHub runners are noisy — never fail a PR on a
    # variance-driven regression, but surface results as an artifact so
    # reviewers can spot outliers. Tuned for ~1 min of actual measurement
    # across the whole suite on top of the ~3 min compile:
    # - `--sample-size 10` is criterion's minimum (default is 100).
    # - `--warm-up-time 1 --measurement-time 1` trims each benchmark to
    #   roughly 2 s of wall-clock. Statistical confidence intervals widen,
    #   which is fine for catching order-of-magnitude regressions rather
    #   than µs-level shifts.
    # - `--noplot` skips SVG rendering; `estimates.json` still lands in
    #   `target/criterion/` so the artifact stays useful.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run criterion benches
        run: >-
          cargo bench --bench queries --
          --sample-size 10
          --warm-up-time 1
          --measurement-time 1
          --noplot
      - uses: actions/upload-artifact@v7
        with:
          name: criterion-report
          path: target/criterion
          retention-days: 14

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo-cyclonedx binary
        id: cache-cyclonedx
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-cyclonedx
          key: cargo-cyclonedx-${{ runner.os }}-0.5.7
      - if: steps.cache-cyclonedx.outputs.cache-hit != 'true'
        run: cargo install cargo-cyclonedx --version 0.5.7 --locked
      - run: cargo cyclonedx --format json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: cartog.cdx.json
          retention-days: 90
