# Golden examples for cartog skill behavioral testing.
#
# Each scenario defines a user query and the expected agent behavior
# when the SKILL.md is loaded. Used for:
#   - Manual regression checks
#   - LLM-as-judge automated evaluation (see eval.sh)
#
# Schema:
#   - id: unique identifier
#     description: what this tests
#     user_query: the user's message to the agent
#     context: optional context provided before the query
#     expected:
#       tool_calls: list of expected tool invocations (the FIRST command matters most)
#       reasoning: why this is the correct behavior
#     anti_patterns: things the agent must NOT do as its FIRST action
#     tags: [routing, setup, refactoring, ...]
#
# Judging rules:
#   - The FIRST command the agent lists is what matters most
#   - Follow-up/conditional commands are acceptable as long as the first is correct
#   - Anti-patterns apply to the FIRST action, not hypothetical follow-ups

# ============================================================
# Search routing: rag search as default
# ============================================================

- id: search_natural_language
  description: Natural language query should use rag search as FIRST command
  user_query: "Find the code that handles authentication token validation"
  expected:
    tool_calls:
      - 'cartog rag search "authentication token validation"'
    reasoning: >
      Natural language query describing behavior. The FIRST command must be
      cartog rag search. Follow-up structural commands (refs, callees) after
      seeing results are acceptable.
  anti_patterns:
    - cartog search as the FIRST command
    - Running cartog search BEFORE or IN PARALLEL with rag search
  tags: [routing]

- id: search_single_keyword
  description: Broad keyword should use rag search as FIRST command
  user_query: "Find code related to config"
  expected:
    tool_calls:
      - 'cartog rag search "config"'
    reasoning: >
      Even single keywords go through rag search first. It handles FTS5 keyword
      matching internally. cartog search should not be the first command.
  anti_patterns:
    - cartog search as the FIRST command
    - Running cartog search BEFORE or IN PARALLEL with rag search
  tags: [routing]

- id: search_identifier_like
  description: '"Where is X used?" can use either rag search or refs'
  user_query: "Where is validate_token used?"
  expected:
    tool_calls:
      - 'cartog rag search "validate_token"'
      - "cartog refs validate_token"
    reasoning: >
      "Where is X used?" is ambiguous — it maps to both code finding (rag search)
      and structural navigation (refs). Either cartog rag search or cartog refs
      as the FIRST command is acceptable. Both are correct approaches.
  anti_patterns:
    - cartog search as the FIRST and ONLY command (without refs follow-up)
    - grep or cat as the first command
  tags: [routing]

- id: search_for_structural_navigation
  description: When user asks "what calls X", use refs --kind calls
  user_query: "What calls validate_token?"
  expected:
    tool_calls:
      - "cartog refs validate_token --kind calls"
    reasoning: >
      "What calls X?" is a structural navigation question. The correct command
      is cartog refs --kind calls (who calls X), NOT cartog callees (what X calls).
      The agent may optionally run cartog search first to confirm the symbol name,
      but refs --kind calls is the key command.
  anti_patterns:
    - cartog callees (callees shows what X calls, not what calls X)
    - Using only cartog rag search without a structural command
  tags: [routing, structural]

- id: search_impact_analysis
  description: '"Is it safe to rename X?" should lead to impact analysis'
  user_query: "Is it safe to rename SessionManager?"
  expected:
    tool_calls:
      - "cartog impact SessionManager --depth 3"
      - "cartog search SessionManager"
      - "cartog refs SessionManager"
    reasoning: >
      "Is it safe to rename X?" maps to impact analysis. The user gave an exact
      symbol name, so cartog impact directly is ideal. cartog search first to
      confirm the name, or cartog refs to find usages, are also acceptable as
      first steps — as long as cartog impact appears in the plan.
  anti_patterns:
    - Using only cartog rag search without a structural impact command
    - Skipping impact analysis entirely
  tags: [routing, refactoring]

- id: refactoring_lsp_escalation
  description: When heuristic refs seem incomplete, escalate to LSP before refactoring
  user_query: "refs only shows 2 callers for validate in AuthService, I know there are more. How do I get better results?"
  context: "cartog refs validate --kind calls already returned only 2 results. The user wants to re-index with LSP for better edge resolution."
  expected:
    tool_calls:
      - "cartog index ."
      - "cartog refs validate --kind calls"
    reasoning: >
      The user reports that heuristic refs are incomplete. The agent should
      re-index with LSP (auto-detected via cartog index . without --no-lsp)
      to improve edge resolution, then re-run refs. The key requirement is
      that cartog index . (without --no-lsp) appears in the command list.
  anti_patterns:
    - Proceeding with refactoring without re-indexing
    - Using cartog index . --no-lsp (defeats the purpose of LSP escalation)
    - Using only grep to find additional callers
  tags: [refactoring, lsp]

- id: refactoring_fast_reindex_after_changes
  description: After applying code changes, re-index fast with --no-lsp
  user_query: "I've finished renaming process_payment to handle_payment across multiple files. Verify nothing is broken."
  context: "User just applied rename changes across multiple files. Old name: process_payment, new name: handle_payment."
  expected:
    tool_calls:
      - "cartog index . --no-lsp"
      - "cartog refs old_method_name"
    reasoning: >
      After code changes, re-index with --no-lsp (heuristic only, ~1s)
      to update the graph, then verify no stale references remain. LSP is not
      needed here — speed matters for the verify loop. The key requirement is
      that cartog index . --no-lsp appears in the command list (it does not
      have to be the very first command — cartog changes first is acceptable).
  anti_patterns:
    - Re-indexing with LSP (unnecessary latency for verification)
    - Skipping re-index entirely
  tags: [refactoring, lsp]

- id: no_parallel_double_call
  description: Single rag search call, not multiple parallel searches
  user_query: "Find code related to contract management and timesheet signing"
  expected:
    tool_calls:
      - 'cartog rag search "contract management and timesheet signing"'
    reasoning: >
      A single rag search call handles everything (FTS5 keyword + vector + reranking).
      The agent should make ONE rag search call, not split into multiple queries
      or run cartog search in parallel. The hybrid search handles multi-concept
      queries internally.
  anti_patterns:
    - Multiple rag search calls for the same query (splitting into sub-queries)
    - cartog search as FIRST command or in parallel
  tags: [routing, do-dont]

- id: search_show_me_related
  description: '"Show me all code related to X" should use rag search'
  user_query: "show me all code related to the user authentication service"
  expected:
    tool_calls:
      - 'cartog rag search "user authentication service"'
    reasoning: >
      "Show me all code related to..." is a natural language query describing
      a domain concept. The FIRST command must be cartog rag search.
      The agent should NOT fall back to grep or file browsing.
  anti_patterns:
    - grep as the FIRST command
    - Glob/Read as the FIRST command
    - cartog search as the FIRST command
  tags: [routing]

# ============================================================
# Documentation search
# ============================================================

- id: search_documentation
  description: Documentation search should use rag search with --kind document
  user_query: "What does the architecture doc say about authentication?"
  expected:
    tool_calls:
      - 'cartog rag search "architecture authentication" --kind document'
    reasoning: >
      The user wants to find information in project documentation. Since rag search
      defaults to code only, the agent must use --kind document to search docs.
      Markdown files are indexed by heading sections and searchable alongside code.
  anti_patterns:
    - 'cartog rag search without --kind document (returns code only by default)'
    - grep or find to locate .md files manually
    - cat README.md to read the whole file
    - cartog search as the FIRST command (search is for symbol names, not content)
  tags: [routing, documentation]

- id: search_docs_and_code_together
  description: Mixed code+docs query should use rag search with --kind all
  user_query: "How is error handling implemented? Check both the code and docs."
  expected:
    tool_calls:
      - 'cartog rag search "error handling" --kind all'
    reasoning: >
      The user wants both code and documentation results. Since rag search defaults
      to code only, the agent must use --kind all to include both code symbols and
      Markdown document sections. The key requirement is that the agent identifies
      cartog rag search with --kind all as the correct tool, even if it also
      mentions needing permissions.
  anti_patterns:
    - Running two separate searches (one for code, one for docs)
    - grep for error handling across .md and .py files
    - Not mentioning --kind all or kind=all at all
  tags: [routing, documentation]

# ============================================================
# Graceful degradation
# ============================================================

- id: rag_search_without_embeddings
  description: rag search should be used even if rag index hasn't completed yet
  user_query: "Find database connection pooling code"
  context: "RAG embedding is still running in background (started by ensure_indexed.sh)"
  expected:
    tool_calls:
      - 'cartog rag search "database connection pooling"'
    reasoning: >
      rag search degrades gracefully. FTS5 keyword search works immediately
      after cartog index. The agent should NOT wait for RAG indexing to complete
      and should NOT fall back to grep.
  anti_patterns:
    - Waiting for RAG indexing to complete before searching
    - Falling back to grep because "RAG isn't ready"
    - Running cartog rag index in the foreground and blocking
  tags: [degradation, do-dont]

# ============================================================
# Setup behavior
# ============================================================

- id: setup_non_blocking
  description: Setup should not block on RAG embedding
  user_query: "Help me explore this new codebase"
  context: "First time using cartog on this project, no .cartog.db exists"
  expected:
    tool_calls:
      - "bash scripts/ensure_indexed.sh"
      - "cartog index ."
    reasoning: >
      The agent should run ensure_indexed.sh or at minimum cartog index .
      to build the code graph. Either is acceptable as the first command.
      The key constraint: the agent must NOT run cartog rag index in the
      foreground and block waiting for it to complete before proceeding.
  anti_patterns:
    - Running cartog rag index in the foreground as a blocking step
    - Telling the user to wait for RAG indexing to complete before proceeding
  tags: [setup, do-dont]

# ============================================================
# Fallback to cartog search for substring matching
# ============================================================

- id: substring_fallback
  description: Fall back to cartog search when rag search returned no results
  user_query: "Find the validate function"
  context: "cartog rag search returned no results for this query"
  expected:
    tool_calls:
      - "cartog search validate"
    reasoning: >
      The context says rag search already returned no results. The agent should
      now fall back to cartog search which supports substring matching.
      It should NOT re-run rag search since we know it failed.
  anti_patterns:
    - Re-running cartog rag search (already tried and returned no results)
    - Giving up without trying cartog search
  tags: [routing, fallback]

# ============================================================
# CLI usage: no chaining, no grep filtering
# ============================================================

- id: no_cli_chaining
  description: Multiple cartog queries should be separate calls, not chained with && or piped through grep
  user_query: "What does getLoginCapability call? And what does ssoCallback call?"
  expected:
    tool_calls:
      - "cartog callees getLoginCapability"
      - "cartog callees ssoCallback"
    reasoning: >
      Each cartog CLI invocation opens a fresh SQLite connection with full
      initialization overhead. The agent should list two separate commands
      on separate lines (not chained with && or | in a single line).
      The FIRST command must be a plain cartog callees call without any
      shell piping, grep filtering, or && chaining on that same line.
  anti_patterns:
    - Chaining with && (e.g., cartog callees X && cartog callees Y)
    - Piping through grep (e.g., cartog callees X | grep "something")
    - Combining both queries in a single bash command
  tags: [do-dont, cli-usage]

# ============================================================
# Codebase overview
# ============================================================

- id: map_overview
  description: Codebase overview should use cartog map
  user_query: "Give me an overview of this codebase"
  expected:
    tool_calls:
      - "cartog map"
    reasoning: >
      "Overview" or "what's in this codebase" maps to cartog map,
      which shows file tree + top symbols ranked by centrality.
  anti_patterns:
    - Manually running ls or find to list files
    - Reading random files to understand the codebase
  tags: [map, overview]

# ============================================================
# Recent changes
# ============================================================

- id: changes_recent
  description: '"What changed recently?" should use cartog changes'
  user_query: "What code changed recently?"
  expected:
    tool_calls:
      - "cartog changes"
    reasoning: >
      "What changed recently?" maps directly to cartog changes, which shows
      symbols affected by recent git commits. The agent should not use git log
      manually or grep for changes.
  anti_patterns:
    - Running git log or git diff manually
    - Running grep to find changes
  tags: [changes]

- id: changes_with_context
  description: Changes command with specific scope
  user_query: "What functions were modified in the last 3 commits?"
  expected:
    tool_calls:
      - "cartog changes --commits 3 --kind function"
    reasoning: >
      The user asks for functions changed in recent commits. cartog changes with
      --commits and --kind filters is the direct answer.
  anti_patterns:
    - Running git log and manually inspecting files
    - Using cartog search without changes context
  tags: [changes]

# ============================================================
# Outline vs read
# ============================================================

- id: outline_over_cat
  description: Use outline instead of cat for file structure
  user_query: "What functions are in src/auth/tokens.py?"
  context: "The project has a src/auth/tokens.py file. The cartog index is up to date."
  expected:
    tool_calls:
      - "cartog outline src/auth/tokens.py"
    reasoning: >
      outline shows symbols with types, signatures, and line ranges.
      No need to read the full file content.
  anti_patterns:
    - cat src/auth/tokens.py
    - Reading the full file when only structure is needed
  tags: [outline]
